name: Publish QA-Skills to npm and GitHub Packages

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.target_commitish }}

      # No registry-url here — avoids ~/.npmrc only pointing at npmjs before GH publish
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Bundle skills into package
        run: node scripts/bundle-skills.js

      - name: Configure git
        run: |
          git config --global user.name "GitHub CD bot"
          git config --global user.email "github-cd-bot@example.com"

      - name: Set version from release tag
        run: npm version ${{ github.event.release.tag_name }} --no-git-tag-version --allow-same-version

      - name: Sync qa-skills wrapper version
        working-directory: packages/qa-skills
        run: |
          npm version ${{ github.event.release.tag_name }} --no-git-tag-version --allow-same-version
          npm pkg set "dependencies.create-qa-skills=^${{ github.event.release.tag_name }}"

      - name: Determine npm tag
        id: npm_tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if echo "$TAG" | grep -qE "alpha|-alpha|\.a\."; then
            echo "tag=alpha" >> $GITHUB_OUTPUT
          elif echo "$TAG" | grep -qE "beta|-beta|\.b\."; then
            echo "tag=beta" >> $GITHUB_OUTPUT
          elif echo "$TAG" | grep -qE "rc|-rc|\.rc\."; then
            echo "tag=rc" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.release.prerelease }}" = "true" ]; then
            echo "tag=beta" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Backup package manifests before GitHub Packages publish
        run: |
          cp package.json /tmp/root-pkg.json
          cp packages/qa-skills/package.json /tmp/wrapper-pkg.json

      # Official pattern: setup-node writes scoped registry + auth placeholder for NODE_AUTH_TOKEN
      - name: Setup Node for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://npm.pkg.github.com"
          scope: "@azanir"

      - name: Publish @azanir/create-qa-skills to GitHub Packages
        run: |
          npm pkg set name=@azanir/create-qa-skills
          npm pkg set publishConfig.registry=https://npm.pkg.github.com
          npm publish --tag ${{ steps.npm_tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      - name: Publish @azanir/qa-skills to GitHub Packages
        working-directory: packages/qa-skills
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VER="${TAG#v}"
          npm pkg set name=@azanir/qa-skills
          npm pkg set publishConfig.registry=https://npm.pkg.github.com
          npm pkg delete dependencies.create-qa-skills
          npm pkg set "dependencies.@azanir/create-qa-skills=^${VER}"
          npm publish --tag ${{ steps.npm_tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      - name: Restore package manifests after GitHub Packages publish
        run: |
          mv /tmp/root-pkg.json package.json
          mv /tmp/wrapper-pkg.json packages/qa-skills/package.json

      - name: Setup Node for npm registry
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Publish create-qa-skills to npm
        run: npm publish --provenance --tag ${{ steps.npm_tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish qa-skills wrapper to npm
        working-directory: packages/qa-skills
        run: npm publish --provenance --tag ${{ steps.npm_tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update Changelog.md
        if: contains(github.event.release.tag_name, 'beta') == false
        run: |
          printf "\n\n## Release ${{ github.event.release.tag_name }}\n\n" >> Changelog.md
          echo "${{ github.event.release.body }}" >> Changelog.md

      - name: Commit version bump and changelog
        if: contains(github.event.release.tag_name, 'beta') == false
        run: |
          git add package.json package-lock.json packages/qa-skills/package.json Changelog.md
          git commit -m "chore: release ${{ github.event.release.tag_name }}" || true
          git push
